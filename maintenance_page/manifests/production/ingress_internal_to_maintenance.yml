apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sap-public-production.teacherservices.cloud
spec:
  ingressClassName: nginx
  rules:
  - host: sap-public-production.teacherservices.cloud
    http:
      paths:
      - pathType: ImplementationSpecific
        backend:
          service:
            name: sap-public-maintenance
            port:
              number: 80

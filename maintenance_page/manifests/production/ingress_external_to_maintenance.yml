apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beta.schoolprofiles.education.gov.uk
spec:
  ingressClassName: nginx
  rules:
  - host: beta.schoolprofiles.education.gov.uk
    http:
      paths:
      - pathType: ImplementationSpecific
        backend:
          service:
            name: sap-public-maintenance
            port:
              number: 80

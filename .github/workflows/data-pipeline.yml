name: School Data Ingestion Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (test or review)"
        required: false
        default: "test"
      aks_namespace:
        description: "AKS Namespace for ETL target"
        required: false
      app_name:
        description: "App/Pod name to connect via konduit (sap-public-pr-XXX)"
        required: false
      upload_backup:
        description: "Upload refreshed DB backup? true/false"
        required: false
        default: "true"

  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      aks_namespace:
        type: string
        required: true
      app_name:
        type: string
        required: true
      upload_backup:
        type: string
        required: true

  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC to refresh Test environment backup

permissions:
  contents: write
  id-token: write      # required for azure/login OIDC
  actions: read

jobs:
  ingest:
    name: Ingest Raw Data & Build Warehouse
    runs-on: ubuntu-latest

    # ===========================================================
    # Determine mode (test or review)
    # ===========================================================
    env:
      TARGET_ENV: ${{ inputs.environment || 'test' }}
      TARGET_NAMESPACE: ${{ inputs.aks_namespace || secrets.AKS_NAMESPACE }}
      TARGET_APP_NAME: ${{ inputs.app_name || secrets.KONDUIT_APP_NAME }}
      UPLOAD_BACKUP: ${{ inputs.upload_backup || 'true' }}

      # Azure storage
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}

      # Sensitive dataset URLs
      SENSITIVE_DATASET_URL: ${{ secrets.SENSITIVE_DATASET_URL }}
      SENSITIVE_ESTABLISHMENT_LINKS_URL: ${{ secrets.SENSITIVE_ESTABLISHMENT_LINKS_URL }}
      SENSITIVE_MAT_LINKS_URL: ${{ secrets.SENSITIVE_MAT_LINKS_URL }}

      # AKS settings
      AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
      AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}

    steps:
      # ===========================================================
      # 1. Checkout
      # ===========================================================
      - name: Checkout
        uses: actions/checkout@v4

      # ===========================================================
      # 2. Install dependencies
      # ===========================================================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client unzip powershell

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      # ===========================================================
      # 3. Azure Login (OIDC)
      # ===========================================================
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ===========================================================
      # 4. Connect to AKS
      # ===========================================================
      - name: Install kubectl
        run: |
          KUBECTL_VERSION="v1.29.8"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

      - name: Install kubelogin
        run: |
          VER="v0.1.6"
          curl -fsSLo kl.zip "https://github.com/Azure/kubelogin/releases/download/${VER}/kubelogin-linux-amd64.zip"
          unzip -q kl.zip
          sudo install -m 0755 bin/linux_amd64/kubelogin /usr/local/bin/kubelogin

      - name: Configure AKS credentials
        run: |
          az aks get-credentials --overwrite-existing \
            -g "${AKS_RESOURCE_GROUP}" \
            -n "${AKS_CLUSTER_NAME}"
          kubelogin convert-kubeconfig -l azurecli

      - name: Download konduit.sh
        run: |
          curl -fsSL https://raw.githubusercontent.com/DFE-Digital/teacher-services-cloud/main/scripts/konduit.sh \
            -o "$GITHUB_WORKSPACE/konduit.sh"
          chmod +x "$GITHUB_WORKSPACE/konduit.sh"

      # ===========================================================
      # 5. Blob container exists
      # ===========================================================
      - name: Ensure Blob container exists
        shell: pwsh
        run: |
          az storage container create `
            --name $env:AZURE_STORAGE_CONTAINER `
            --connection-string $env:AZURE_STORAGE_CONNECTION_STRING `
            --public-access off | Out-Null

      # ===========================================================
      # 6. Version all source datasets (unchanged from your version)
      # ===========================================================
      - name: Version datasets from raw_sources.json and upload to Blob
        id: version
        shell: pwsh
        run: |
          # (❗ unchanged — full block kept exactly as your original)
          # This step handles: backtracking, signature matching, upload
          # AND writes latest_files + changed=true|false to GITHUB_OUTPUT
          . ./SAPData/scripts/versioning.ps1

      # ===========================================================
      # 7. Download generator input files
      # ===========================================================
      - name: Download generator inputs
        shell: pwsh
        env:
          LATEST_FILES: ${{ steps.version.outputs.latest_files }}
        run: |
          . ./SAPData/scripts/download-inputs.ps1

      # ===========================================================
      # 8. Build SQL generator + generate SQL
      # ===========================================================
      - name: Build SQL Generator
        run: |
          dotnet build SAPPub.sln --configuration Release

      - name: Generate SQL Scripts
        run: |
          dotnet run --configuration Release --project SAPData/SAPData.csproj

      # ===========================================================
      # 9. Run ETL via konduit (this writes into review or test DB)
      # ===========================================================
      - name: Run ETL pipeline via konduit
        working-directory: SAPData/Sql
        shell: bash
        run: |
          echo "Running ETL into namespace $TARGET_NAMESPACE, app=$TARGET_APP_NAME"

          "$GITHUB_WORKSPACE/konduit.sh" \
            -n "${TARGET_NAMESPACE}" \
            -t 7200 \
            -x \
            -i "$GITHUB_WORKSPACE/SAPData/Sql/run_all.sql" \
            "${TARGET_APP_NAME}" -- psql

      # ===========================================================
      # 10. Create + Upload DB backup (ONLY in test mode + upload enabled)
      # ===========================================================
      - name: Create + upload DB backup
        if: ${{ env.TARGET_ENV == 'test' && env.UPLOAD_BACKUP == 'true' }}
        shell: bash
        run: |
          echo "Creating DB backup for TEST environment..."

          TODAY=$(TZ=Europe/London date +"%F")
          LOCAL_FILE="sappub_review_seed_${TODAY}.sql.gz"
          LATEST_BLOB="db-backups/sappub_review_seed_latest.sql.gz"

          "$GITHUB_WORKSPACE/konduit.sh" \
            -n "${TARGET_NAMESPACE}" \
            -t 7200 \
            -x \
            "${TARGET_APP_NAME}" -- \
              pg_dump --format=plain --no-owner --no-privileges \
              | gzip -c > "${LOCAL_FILE}"

          az storage blob upload \
            --container-name "${AZURE_STORAGE_CONTAINER}" \
            --name "${LATEST_BLOB}" \
            --file "${LOCAL_FILE}" \
            --connection-string "${AZURE_STORAGE_CONNECTION_STRING}" \
            --overwrite true

          echo "Backup uploaded: ${LATEST_BLOB}"
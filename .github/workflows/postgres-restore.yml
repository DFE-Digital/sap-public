name: Restore database from Azure storage

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to restore
        required: true
        default: test
        type: choice
        options:
        - review
        - test
        - production
      confirm-production:
        description: Must be set to true if restoring production
        required: true
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
      backup-file:
        description: Name of the backup file in Azure storage. e.g. sappub_prod_2024-08-09.sql.gz. The default value is today's scheduled backup.
        type: string
        required: false
      pull-request-number:
        description: Pull request number (required for review environment)
        required: false
        type: string
  workflow_call:
    inputs:
      environment:
        description: Environment to restore
        required: true
        default: test
        type: string
      confirm-production:
        description: Must be set to true if restoring production
        required: true
        default: 'false'
        type: string
      backup-file:
        description: Name of the backup file in Azure storage. e.g. sappub_prod_2024-08-09.sql.gz. The default value is today's scheduled backup.
        type: string
        required: false
      pull-request-number:
        description: Pull request number (required for review environment)
        required: false
        type: string
      storage-account:
        description: Storage account to restore from
        required: false
        type: string
      resource-group:
        description: Resource group to restore from
        required: false
        type: string
    secrets:
        AZURE_CLIENT_ID:
          required: true
        AZURE_TENANT_ID:
          required: true
        AZURE_SUBSCRIPTION_ID:
          required: true

permissions:
  id-token: write

env:
  SERVICE_NAME: sap-public
  SERVICE_SHORT: sappub
  TF_VARS_PATH: terraform/application/config

jobs:
  restore:
    name: Restore AKS Database
    if: ${{ inputs.environment != 'production' || (inputs.environment == 'production' && inputs.confirm-production == 'true' )  }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency: deploy_${{ inputs.environment }}

    steps:
    - uses: actions/checkout@v4
      name: Checkout

    - name: Set environment variables
      run: |
        source global_config/${{ inputs.environment }}.sh
        tf_vars_file=${{ env.TF_VARS_PATH }}/${{ inputs.environment }}.tfvars.json
        echo "CLUSTER=$(jq -r '.cluster' ${tf_vars_file})" >> $GITHUB_ENV
        echo "NAMESPACE=$(jq -r '.namespace' ${tf_vars_file})" >> $GITHUB_ENV
        echo "RESOURCE_GROUP_NAME=${AZURE_RESOURCE_PREFIX}-${SERVICE_SHORT}-${CONFIG_SHORT}-rg" >> $GITHUB_ENV
        echo "STORAGE_ACCOUNT_NAME=${AZURE_RESOURCE_PREFIX}${SERVICE_SHORT}dbbkp${CONFIG_SHORT}sa" >> $GITHUB_ENV
        echo "DB_SERVER=${AZURE_RESOURCE_PREFIX}-${SERVICE_SHORT}-${CONFIG_SHORT}-pg" >> $GITHUB_ENV
        TODAY=$(date +"%F")
        echo "BACKUP_FILE=${SERVICE_SHORT}_${CONFIG_SHORT}_${TODAY}.sql" >> $GITHUB_ENV
        if [ "${{ inputs.backup-file }}" != "" ]; then
          BACKUP_FILE=${{ inputs.backup-file }}
        else
          BACKUP_FILE=${SERVICE_SHORT}_${CONFIG_SHORT}_${TODAY}.sql.gz
        fi
        echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV

    - name: Set app name for restore
      id: set_app_name
      run: |
        APP_NAME="${{ env.SERVICE_NAME }}-${{ inputs.environment }}"
        if [ "${{ inputs.environment }}" = "review" ] && [ -n "${{ inputs.pull-request-number }}" ]; then
          APP_NAME="${APP_NAME}-${{ inputs.pull-request-number }}"
        fi
        echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

    - name: Restore ${{ inputs.environment }} postgres
      uses: DFE-Digital/github-actions/restore-postgres-backup@master
      with:
        storage-account: ${{ inputs.storage-account || env.STORAGE_ACCOUNT_NAME }}
        resource-group: ${{ inputs.resource-group || env.RESOURCE_GROUP_NAME }}        
        app-name: ${{ env.APP_NAME }}
        cluster: ${{ env.CLUSTER }}
        namespace: ${{ env.NAMESPACE }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        backup-file: ${{ env.BACKUP_FILE }}

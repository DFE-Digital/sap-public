name: Build and Deploy
concurrency: build_and_deploy_${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        default: review
        options:
          - review
          - test
          - production
      docker-image-tag:
        description: "Docker image tag to deploy (optional)"
        required: true
        type: string
      pull-request-number:
        description: "Pull request number (required for review environment)"
        required: false
        type: string

  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize, labeled]

env:
  TERRAFORM_BASE: terraform/application
  HEALTHCHECK_CMD: "healthcheck"

jobs:

  # ---------------------------
  # BUILD
  # ---------------------------
  build:
    name: Build
    if: ${{ github.event_name != 'workflow_dispatch' }}
    env:
      DOCKER_REPOSITORY: ghcr.io/dfe-digital/sap-public
    outputs:
      docker-image-tag: ${{ steps.build-image.outputs.tag }}
    permissions:
      packages: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and push docker image
        id: build-image
        uses: DFE-Digital/github-actions/build-docker-image@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          context: .
          docker-repository: ${{ env.DOCKER_REPOSITORY }}
          max-cache: true
          reuse-cache: true
          snyk-token: ${{ secrets.SNYK_TOKEN }}

  # ---------------------------
  # TESTS: UNIT, INTEGRATION, UI
  # ---------------------------
  test:
    name: Run Unit, Integration and UI Tests
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Debug

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install Playwright browsers (.NET)
        run: pwsh ./Tests/SAPPub.Web.Tests/bin/Debug/net8.0/playwright.ps1 install

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: build frontend assets
        working-directory: SAPPub.Web
        run: npm ci

      - name: Run All Tests with Coverage
        env:
          HEADED: 0
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: true
        run: |
          TEST_PROJECTS=$(find ./Tests -type f -name "*.Tests.csproj" | sort)

          for proj in $TEST_PROJECTS; do
            echo "=== Running tests in $proj ==="

            dotnet test "$proj" \
              --no-build \
              --configuration Debug \
              --results-directory "TestResults" \
              --logger "trx;LogFileName=$(basename "$proj" .csproj).trx" \
              --collect:"XPlat Code Coverage" \
              --settings ./coverlet.runsettings \
              --verbosity normal
          done

      - name: Upload Test Result Files
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: "**/TestResults/**/*"
          retention-days: 5

      - name: Upload UI artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-artifacts
          path: |
            **/test-artifacts/screenshots/**
            **/test-artifacts/videos/**
            **/test-artifacts/traces/**

      - name: Publish Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          reporter: 'dotnet-trx'
          path: "**/TestResults/**/*.trx"
          name: 'Test Results'

      - name: merge coverage files
        run: |
          dotnet tool install -g dotnet-coverage
          dotnet coverage merge --reports $(find TestResults -name "coverage.cobertura.xml") -f cobertura -o coverage-results/coverage.xml

      - name: Generate Coverage Report
        id: code_coverage_report_action
        if: ${{ github.actor != 'dependabot[bot]'}}
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.10
          reportgenerator -reports:coverage-results/coverage.xml -targetdir:./coverage -reporttypes:MarkdownSummaryGithub "-filefilters:-*/Tests/*"

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request' && (success() || failure())
        with:
          header: Coverage
          recreate: true
          path: ./coverage/SummaryGithub.md

      - name: Add Accessibility PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request' && (success() || failure())
        with:
          header: Accessibility
          recreate: true
          path: ./Tests/accessibility-results/accessibility-violations.md

  # ---------------------------
  # REFRESH DATA - Run after environment set up via deploying app. Without prior deployment, this will fail. 
  # ---------------------------
  refresh-data:
    name: Refresh data (School Data Ingestion Pipeline)
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'refresh data') }}
    needs: [build, test, deploy-review-app-with-refresh]
    uses: ./.github/workflows/data-pipeline.yml
    secrets: inherit
    with:
      environment: review
      pr-number: ${{ github.event.pull_request.number }}
    permissions:
      contents: write
      id-token: write
      actions: read
      packages: write


  # ---------------------------
  # REVIEW APP DEPLOYMENT (PR) - no refresh requested
  # ---------------------------
  deploy-review-app:
    name: Deployment To Review (no refresh)
    concurrency: deploy_review_${{ github.event.pull_request.number }}
    needs: [build, test]
    if: ${{ github.event_name == 'pull_request'
      && (
      github.event.action == 'labeled' ||
      github.event.action == 'synchronize'
      )
      && contains(github.event.pull_request.labels.*.name, 'deploy')
      && !contains(github.event.pull_request.labels.*.name, 'refresh data') }}
    environment:
      name: review
      url: ${{ steps.deploy_review.outputs.environment_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write

    env:
      AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
      AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
      KONDUIT_NAMESPACE: ${{ secrets.AKS_NAMESPACE }}
      KONDUIT_APP_NAME: ${{ secrets.KONDUIT_APP_NAME }}

    steps:
      - name: Deploy App to Review
        id: deploy_review
        uses: DFE-Digital/github-actions/deploy-to-aks@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          environment: review
          pr-number: ${{ github.event.pull_request.number }}
          sha: ${{ needs.build.outputs.docker-image-tag }}
          terraform-base: ${{ env.TERRAFORM_BASE }}
          healthcheck: ${{ env.HEALTHCHECK_CMD }}
          db-seed: false
          smoke-test: false
          gcp-wip: ${{ vars.GCP_WIP }}
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

      # ---------------------------
      # REVIEW APP DATABASE DEPLOYMENT (PR)
      # ---------------------------
      - name: Checkout (needed for workspace consistency)
        uses: actions/checkout@v6

      - name: Install Azure CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl (pinned)
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="v1.29.8"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Install kubelogin (pinned)
        shell: bash
        run: |
          set -euo pipefail
          KUBELOGIN_VERSION="v0.1.6"
          curl -fsSLo kubelogin.zip "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip"
          unzip -q kubelogin.zip
          sudo install -m 0755 bin/linux_amd64/kubelogin /usr/local/bin/kubelogin
          kubelogin --version

      - name: Configure AKS credentials
        shell: bash
        run: |
          set -euo pipefail
          : "${AKS_RESOURCE_GROUP:?AKS_RESOURCE_GROUP is not set}"
          : "${AKS_CLUSTER_NAME:?AKS_CLUSTER_NAME is not set}"
          az aks get-credentials --overwrite-existing -g "${AKS_RESOURCE_GROUP}" -n "${AKS_CLUSTER_NAME}"
          kubelogin convert-kubeconfig -l azurecli

      - name: Download konduit.sh
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/DFE-Digital/teacher-services-cloud/main/scripts/konduit.sh \
            -o "$GITHUB_WORKSPACE/konduit.sh"
          chmod +x "$GITHUB_WORKSPACE/konduit.sh"
          ls -la "$GITHUB_WORKSPACE/konduit.sh"

      - name: Download seed backup from Blob
        if: ${{ github.event.action == 'labeled' && github.event.label.name == 'deploy' && !contains(github.event.pull_request.labels.*.name, 'refresh data') }}
        shell: bash
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
        run: |
          set -euo pipefail
          BACKUP_BLOB="db-backups/sappub_review_seed_latest.sql.gz"
          BACKUP_FILE="seed.sql.gz"

          az storage blob download \
            --container-name "${AZURE_STORAGE_CONTAINER}" \
            --name "${BACKUP_BLOB}" \
            --file "${BACKUP_FILE}" \
            --connection-string "${AZURE_STORAGE_CONNECTION_STRING}" \
            --overwrite true

          ls -lh "${BACKUP_FILE}"

      - name: Restore backup into PR review DB (single transaction, with retry)
        if: ${{ github.event.action == 'labeled' && github.event.label.name == 'deploy' && !contains(github.event.pull_request.labels.*.name, 'refresh data') }}
        shell: bash
        env:
          AKS_NAMESPACE: ${{ secrets.AKS_REVIEW_NAMESPACE }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          APP_NAME="sap-public-pr-${PR_NUMBER}"
          BACKUP_FILE="seed.sql.gz"
          LOG_FILE="pr_seed_restore.log"
          MAX_ATTEMPTS=5

          : "${AKS_NAMESPACE:?AKS_NAMESPACE is not set}"
          ls -lh "${BACKUP_FILE}"
          gzip -t "${BACKUP_FILE}"

          # Keep session alive during long restore
          export PGOPTIONS='-c tcp_keepalives_idle=60 -c tcp_keepalives_interval=30 -c tcp_keepalives_count=10'

          run_restore () {
            local attempt=1
            local delay=10

            while [ $attempt -le $MAX_ATTEMPTS ]; do
              echo "=============================="
              echo "PR seed restore attempt $attempt/$MAX_ATTEMPTS"
              echo "=============================="

              set +e
              "$GITHUB_WORKSPACE/konduit.sh" \
                -n "${AKS_NAMESPACE}" \
                -t 28800 \
                -x \
                -i "${BACKUP_FILE}" -c \
                "${APP_NAME}" -- \
                psql -X -v ON_ERROR_STOP=1 -1 -f - 2>&1 | tee "${LOG_FILE}"
              restore_rc=${PIPESTATUS[0]}
              set -e

              if [ $restore_rc -eq 0 ]; then
                echo "PR seed restore succeeded"
                return 0
              fi

              if grep -Eqi \
                "SSL error: unexpected eof|connection to server was lost|server closed the connection unexpectedly|could not receive data from server|EOF detected|connection reset|failed to exec in container|no running task found|Internal error occurred: error executing command in container" \
                "${LOG_FILE}"; then
                echo "Transient restore connection issue detected. Retrying in ${delay}s..."
                sleep $delay
                delay=$((delay * 2))
                if [ $delay -gt 120 ]; then delay=120; fi
                attempt=$((attempt + 1))
              else
                echo "Non-transient restore failure (exit ${restore_rc})"
                tail -n 200 "${LOG_FILE}" || true
                return $restore_rc
              fi
            done

            echo "PR seed restore failed after ${MAX_ATTEMPTS} attempts"
            return 1
          }

          run_restore

  # ---------------------------
  # REVIEW APP DEPLOYMENT (PR) - refresh requested
  # ---------------------------
  deploy-review-app-with-refresh:
    name: Deployment To Review (before refresh)
    concurrency: deploy_review_${{ github.event.pull_request.number }}
    needs: [build, test]
    if: ${{ github.event_name == 'pull_request'
      && (
      github.event.action == 'labeled' ||
      github.event.action == 'synchronize'
      )
      && contains(github.event.pull_request.labels.*.name, 'deploy')
      && contains(github.event.pull_request.labels.*.name, 'refresh data')
      }}

    environment:
      name: review
      url: ${{ steps.deploy_review.outputs.environment_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write

    steps:
      - name: Deploy App to Review
        id: deploy_review
        uses: DFE-Digital/github-actions/deploy-to-aks@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          environment: review
          pr-number: ${{ github.event.pull_request.number }}
          sha: ${{ needs.build.outputs.docker-image-tag }}
          terraform-base: ${{ env.TERRAFORM_BASE }}
          healthcheck: ${{ env.HEALTHCHECK_CMD }}
          db-seed: false
          smoke-test: false
          gcp-wip: ${{ vars.GCP_WIP }}
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}


  # ---------------------------
  # DEPLOY TEST (AUTO)
  # ---------------------------
  deploy:
    name: Deploy to Test
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write

    strategy:
      max-parallel: 1
      matrix:
        #environment: [test, production] //Commented out should we wish to reinstate auto deployment with the matrix.
        environment: [test]

    environment:
      name: ${{ matrix.environment }}
      url: ${{ steps.deploy_app.outputs.environment_url }}

    steps:
      - name: Deploy app to ${{ matrix.environment }}
        id: deploy_app
        uses: DFE-Digital/github-actions/deploy-to-aks@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          environment: ${{ matrix.environment }}
          sha: ${{ needs.build.outputs.docker-image-tag }}
          terraform-base: ${{ env.TERRAFORM_BASE }}
          healthcheck: ${{ env.HEALTHCHECK_CMD }}
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          smoke-test: false
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
          gcp-wip: ${{ vars.GCP_WIP }}
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

  # ---------------------------
  # REFRESH TEST DATABSE (AUTO - IF REQUIRED)
  # ---------------------------

  detect-refresh-data-on-merge:
    name: Detect refresh-data label on merged PR
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should-refresh: ${{ steps.detect.outputs.should_refresh }}

    steps:
      - name: Check labels on PR associated with merge commit
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const commit_sha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha
            });

            const mergedPr = prs.data.find(pr => pr.merged_at && pr.base?.ref === "main");

            if (!mergedPr) {
              core.info(`No merged PR found for commit ${commit_sha}.`);
              core.setOutput("should_refresh", "false");
              return;
            }

            const hasRefreshDataLabel = (mergedPr.labels || [])
              .some(label => label.name === "refresh data");

            core.info(`PR ${mergedPr.number} has 'refresh data' label: ${hasRefreshDataLabel}`);
            core.setOutput("should_refresh", hasRefreshDataLabel ? "true" : "false");

  refresh-data-test-after-merge:
    name: Refresh data in test after merge
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-refresh-data-on-merge.outputs.should-refresh == 'true' }}
    needs: [deploy, detect-refresh-data-on-merge]
    uses: ./.github/workflows/data-pipeline.yml
    secrets: inherit
    with:
      environment: test
    permissions:
      contents: write
      id-token: write
      actions: read
      packages: write


  # ---------------------------
  # MANUAL DEPLOY
  # ---------------------------
  manual_deploy:
    name: Manual deploy
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy_manual.outputs.environment_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write

    steps:
      - name: Deploy app to ${{ inputs.environment }}
        id: deploy_manual
        uses: DFE-Digital/github-actions/deploy-to-aks@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          environment: ${{ inputs.environment }}
          pr-number: ${{ inputs.pull-request-number }}
          sha: ${{ inputs.docker-image-tag }}
          terraform-base: ${{ env.TERRAFORM_BASE }}
          healthcheck: ${{ env.HEALTHCHECK_CMD }}
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
          smoke-test: false
          db-seed: ${{ inputs.environment == 'review' && 'true' || 'false' }}
          gcp-wip: ${{ vars.GCP_WIP }}
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

  deploy_domains_infra:
    name: Deploy Domains Infrastructure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency: deploy_domains_infra
    needs: [deploy]
    environment:
      name: production
    permissions:
      id-token: write

    steps:
      - name: Deploy Domains Infrastructure
        uses: DFE-Digital/github-actions/deploy-domains-infra@master
        with:
          azure-client-id:  ${{ secrets.AZURE_CLIENT_ID  }}
          azure-tenant-id:  ${{ secrets.AZURE_TENANT_ID   }}
          azure-subscription-id:  ${{ secrets.AZURE_SUBSCRIPTION_ID   }}
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}

  deploy_domains_env:
    name: Deploy Domains to ${{ matrix.domain_environment }} environment
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        domain_environment: [test, production]
    if: >-
      ${{
        always() &&
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        (
          matrix.domain_environment != 'test' ||
          needs.detect-refresh-data-on-merge.outputs.should-refresh != 'true' ||
          needs.refresh-data-test-after-merge.result == 'success'
        )
      }}
    concurrency: deploy_domains_env_${{ matrix.domain_environment }}
    needs: [deploy_domains_infra, detect-refresh-data-on-merge, refresh-data-test-after-merge]   
    environment:
      name: production
    permissions:
      id-token: write

    steps:
      - name: Deploy Domains Environment
        id: deploy_domains_env
        uses: DFE-Digital/github-actions/deploy-domains-env@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID  }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID   }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID   }}
          environment: ${{ matrix.domain_environment }}
          healthcheck: healthcheck
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
          terraform-base: terraform/domains/environment_domains
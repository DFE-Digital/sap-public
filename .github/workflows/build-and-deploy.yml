name: Build and Deploy
concurrency: build_and_deploy_${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        default: review
        options:
          - review
          - test
          - production
      docker-image-tag:
        description: "Docker image tag to deploy (optional)"
        required: true
        type: string
      pull-request-number:
        description: "Pull request number (required for review environment)"
        required: false
        type: string

  push:
    branches: [main]

  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled]

env:
  TERRAFORM_BASE: terraform/application
  HEALTHCHECK_CMD: ""

# ======================================================
# JOB: BUILD
# ======================================================
jobs:
  build:
    name: Build
    if: ${{ github.event_name != 'workflow_dispatch' }}
    env:
      DOCKER_REPOSITORY: ghcr.io/dfe-digital/sap-public
    outputs:
      docker-image-tag: ${{ steps.build-image.outputs.tag }}
    permissions:
      packages: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push docker image
        id: build-image
        uses: DFE-Digital/github-actions/build-docker-image@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          context: .
          docker-repository: ${{ env.DOCKER_REPOSITORY }}
          max-cache: true
          reuse-cache: true
          snyk-token: ${{ secrets.SNYK_TOKEN }}

# ======================================================
# JOB: TEST
# ======================================================
  test:
    name: Run Unit, Integration and UI Tests
    if: ${{ github.event_name != 'workflow_dispatch' }}
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Debug

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install Playwright browsers (.NET)
        run: pwsh ./Tests/SAPPub.Web.Tests/bin/Debug/net8.0/playwright.ps1 install

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: build frontend assets
        working-directory: SAPPub.Web
        run: npm ci

      - name: Run All Tests with Coverage
        env:
          HEADED: 0
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: true
        run: |
          TEST_PROJECTS=$(find ./Tests -type f -name "*.Tests.csproj" | sort)
          for proj in $TEST_PROJECTS; do
            echo "=== Running tests in $proj ==="
            dotnet test "$proj" \
              --no-build \
              --configuration Debug \
              --results-directory "TestResults" \
              --logger "trx;LogFileName=$(basename "$proj" .csproj).trx" \
              --collect "XPlat Code Coverage" \
              /p:CollectCoverage=true \
              /p:CoverletOutputFormat=cobertura \
              /p:DeterministicReport=true \
              /p:UseSourceLink=true \
              /p:Exclude='[*]AspNetCoreGeneratedDocument.*%2c[*]AspNetCore.Views.*' \
              /p:ExcludeByAttribute='GeneratedCodeAttribute*%2cObsoleteAttribute*%2cExcludeFromCodeCoverage' \
              --verbosity normal
          done

      - name: Upload Test Result Files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/TestResults/**/*"
          retention-days: 5

      - name: Upload UI artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-artifacts
          path: |
            **/test-artifacts/screenshots/**
            **/test-artifacts/videos/**
            **/test-artifacts/traces/**

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          reporter: 'dotnet-trx'
          path: "**/TestResults/**/*.trx"
          name: 'Test Results'

      - name: merge coverage files
        run: |
          dotnet tool install -g dotnet-coverage
          dotnet coverage merge --reports $(find Tests -name "coverage.cobertura.xml") -f cobertura -o coverage-results/coverage.xml

      - name: Generate Coverage Report
        uses: clearlyip/code-coverage-report-action@v6
        id: code_coverage_report_action
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          filename: "coverage-results/coverage.xml"
          fail_on_negative_difference: true
          only_list_changed_files: true

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: steps.code_coverage_report_action.outputs.file != '' && github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

# ======================================================
# JOB: DEPLOY REVIEW (Unified: refresh + no-refresh)
# ======================================================
  deploy-review:
    name: Deploy Review App (with/without refresh)
    concurrency: deploy_review_${{ github.event.pull_request.number }}
    needs: [build, test]
    if: |
      github.event_name == 'pull_request' &&
      (
        github.event.action == 'labeled' ||
        github.event.action == 'synchronize'
      ) &&
      contains(github.event.pull_request.labels.*.name, 'deploy')
    environment:
      name: review
      url: ${{ steps.deploy_app.outputs.environment_url }}
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      APP_NAME: sap-public-pr-${{ github.event.pull_request.number }}
      AKS_REVIEW_NAMESPACE: ${{ secrets.AKS_REVIEW_NAMESPACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Review App
        id: deploy_app
        uses: DFE-Digital/github-actions/deploy-to-aks@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          environment: review
          pr-number: ${{ env.PR_NUMBER }}
          sha: ${{ needs.build.outputs.docker-image-tag }}
          terraform-base: ${{ env.TERRAFORM_BASE }}
          healthcheck: ${{ env.HEALTHCHECK_CMD }}
          db-seed: false
          smoke-test: false

      - name: Determine refresh mode
        id: mode
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'refresh data') }}" == "true" ]]; then
            echo "mode=refresh" >> $GITHUB_OUTPUT
          else
            echo "mode=seed" >> $GITHUB_OUTPUT
          fi

      # --------------------------------------------
      # MODE 1: No refresh - restore shared backup
      # --------------------------------------------
      - name: Restore Shared Seed Backup
        if: ${{ steps.mode.outputs.mode == 'seed' }}
        run: |
          BACKUP_BLOB="db-backups/sappub_review_seed_latest.sql.gz"
          BACKUP_FILE="seed.sql.gz"

          echo "Downloading shared seed backup..."
          az storage blob download \
            --container-name "${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            --name "${BACKUP_BLOB}" \
            --file "${BACKUP_FILE}" \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --overwrite true

          gzip -t "${BACKUP_FILE}"

          "$GITHUB_WORKSPACE/konduit.sh" \
            -n "${AKS_REVIEW_NAMESPACE}" \
            -t 7200 \
            -x \
            -i "${BACKUP_FILE}" -c \
            "${APP_NAME}" -- psql -v ON_ERROR_STOP=1 -X

      # --------------------------------------------
      # MODE 2: Refresh - run ETL into review DB
      # --------------------------------------------
      - name: Run ETL into Review DB
        if: ${{ steps.mode.outputs.mode == 'refresh' }}
        uses: ./.github/workflows/data-pipeline.yml
        with:
          environment: review
          aks_namespace: ${{ secrets.AKS_REVIEW_NAMESPACE }}
          app_name: ${{ env.APP_NAME }}
          upload_backup: "false"
        secrets: inherit

# ======================================================
# JOB: REFRESH DATA (main branch)
# ======================================================
  refresh-data-main:
    name: Refresh Data (Main Merge)
    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.pull_request.labels.*.name, 'refresh data')
    uses: ./.github/workflows/data-pipeline.yml
    with:
      environment: test
      aks_namespace: ${{ secrets.AKS_NAMESPACE }}
      app_name: ${{ secrets.KONDUIT_APP_NAME }}
      upload_backup: "true"
    secrets: inherit

# ======================================================
# JOB: TEST + PROD DEPLOY
# ======================================================
  deploy:
    name: Deploy to Test and Production
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
    strategy:
      max-parallel: 1
      matrix:
        environment: [test, production]

    environment:
      name: ${{ matrix.environment }}

    steps:
      - name: Deploy App to ${{ matrix.environment }}
        id: deploy_app
        uses: DFE-Digital/github-actions/deploy-to-aks@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          environment: ${{ matrix.environment }}
          sha: ${{ needs.build.outputs.docker-image-tag }}
          terraform-base: ${{ env.TERRAFORM_BASE }}
          healthcheck: ${{ env.HEALTHCHECK_CMD }}
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          smoke-test: false
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}

 # ---------------------------
 # MANUAL DEPLOY
 # ---------------------------
 manual_deploy:
   name: Manual deploy
   if: ${{ github.event_name == 'workflow_dispatch' }}
   environment:
     name: ${{ inputs.environment }}
     url: ${{ steps.deploy_manual.outputs.environment_url }}
   runs-on: ubuntu-latest
   permissions:
     id-token: write
     pull-requests: write

   steps:
     - name: Deploy app to ${{ inputs.environment }}
       id: deploy_manual
       uses: DFE-Digital/github-actions/deploy-to-aks@master
       with:
         azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
         azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
         azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
         environment: ${{ inputs.environment }}
         pr-number: ${{ inputs.pull-request-number }}
         sha: ${{ inputs.docker-image-tag }}
         terraform-base: ${{ env.TERRAFORM_BASE }}
         healthcheck: ${{ env.HEALTHCHECK_CMD }}
         teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
         service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
         smoke-test: false
         db-seed: ${{ inputs.environment == 'review' && 'true' || 'false' }}

 deploy_domains_infra:
   name: Deploy Domains Infrastructure
   runs-on: ubuntu-latest
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   concurrency: deploy_domains_infra
   needs: [deploy]
   environment:
     name: production
   permissions:
     id-token: write

   steps:
     - name: Deploy Domains Infrastructure
       uses: DFE-Digital/github-actions/deploy-domains-infra@master
       with:
         azure-client-id:  ${{ secrets.AZURE_CLIENT_ID  }}
         azure-tenant-id:  ${{ secrets.AZURE_TENANT_ID   }}
         azure-subscription-id:  ${{ secrets.AZURE_SUBSCRIPTION_ID   }}
         teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
         service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}

 deploy_domains_env:
   name: Deploy Domains to ${{ matrix.domain_environment }} environment
   runs-on: ubuntu-latest
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   concurrency: deploy_domains_env_${{ matrix.domain_environment }}
   needs: [deploy_domains_infra]
   strategy:
     max-parallel: 1
     matrix:
       domain_environment: [test, production]
   environment:
     name: production
   permissions:
     id-token: write

   steps:
     - name: Deploy Domains Environment
       id: deploy_domains_env
       uses: DFE-Digital/github-actions/deploy-domains-env@master
       with:
         azure-client-id: ${{ secrets.AZURE_CLIENT_ID  }}
         azure-tenant-id: ${{ secrets.AZURE_TENANT_ID   }}
         azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID   }}
         environment: ${{ matrix.domain_environment }}
         healthcheck: healthcheck
         teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
         service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
         terraform-base: terraform/domains/environment_domains

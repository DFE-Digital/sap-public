name: Sync DB backup between environments

on:
  workflow_dispatch:
    inputs:
     source-environment:
        description: Source environment to backup
        required: true
        default: test
        type: choice
        options:
          - test
          - production
     target-environment:
        description: Target environment to restore
        required: true
        default: production
        type: choice
        options:
            - review
            - test
            - production
     excluded-tables:
        description: Comma-separated list of tables to exclude
        required: true
        default: "gateway_user gateway_user_audit gateway_page_view_audit gateway_local_authority gateway_settings"
     confirm-production:
        description: Type 'PROCEED' to confirm restoring to production
        required: false
        default: ''
        type: string
     pull-request-number:
        description: "Pull request number (required for review environment)"
        required: false
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Backing up database from ${{ inputs.source-environment }} environment..."

  restore:
    runs-on: ubuntu-latest
    needs: backup
    steps:
      - run: echo "Restoring database to ${{ inputs.target-environment }} environment..."
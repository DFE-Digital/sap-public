name: Sync DB backup between environments

on:
  workflow_dispatch:
    inputs:
     source-environment:
        description: Source environment to backup
        required: true
        default: test
        type: choice
        options:
          - test
          - production
     target-environment:
        description: Target environment to restore
        required: true
        default: production
        type: choice
        options:
            - test
            - production
     exclude-gateway-tables:
        description: Exclude all gateway tables from backup
        required: false
        type: boolean
        default: true
     exclude-tables:
        description: Additional or alternative tables to exclude from backup (space-separated list, optional)
        required: false
        type: string
        default: ""
     confirm-production:
        description: Must be set to true if restoring production
        required: true
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
     backup-file:
            description: |
              Backup file name (without extension). Default is sappub_[source-environment]_[target-environment]_YYYY-MM-DD.sql. (Optional)
            required: false
            type: string
            default: default

permissions:
  contents: write
  packages: write
  id-token: write

env:
  SERVICE_NAME: sap-public
  SERVICE_SHORT: sappub
  TF_VARS_PATH: terraform/application/config

jobs:
  backup:
    name: Backup database
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.source-environment }}
    env:
      DEPLOY_ENV: ${{ inputs.source-environment }}  
    outputs:     
      backup-file: ${{ steps.set-outputs.outputs.backup_file }}
    
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}

      - name: Set environment variables
        run: |
          source global_config/${{ inputs.source-environment }}.sh
          tf_vars_file=terraform/application/config/${{ inputs.source-environment }}.tfvars.json
          echo "CLUSTER=$(jq -r '.cluster' ${tf_vars_file})" >> $GITHUB_ENV
          echo "NAMESPACE=$(jq -r '.namespace' ${tf_vars_file})" >> $GITHUB_ENV
          TODAY=$(date +"%F")
          if [ "${{ inputs.backup-file }}" == "default" ]; then
            BACKUP_FILE="sappub_${{ inputs.source-environment }}_${{ inputs.target-environment }}_${TODAY}.sql"
          else
            BACKUP_FILE="${{ inputs.backup-file }}.sql"
          fi
          echo "BACKUP_FILE=${BACKUP_FILE}" >> $GITHUB_ENV
          GATEWAY_TABLES="public.gateway_*"
          EXCLUDE_TABLES_INPUT="${{ inputs.exclude-tables }}"
          if [ "${{ inputs.exclude-gateway-tables }}" = "true" ] && [ -n "${EXCLUDE_TABLES_INPUT}" ]; then
            EXCLUDE_TABLES="${GATEWAY_TABLES} ${EXCLUDE_TABLES_INPUT}"
          elif [ "${{ inputs.exclude-gateway-tables }}" = "true" ]; then
            EXCLUDE_TABLES="${GATEWAY_TABLES}"
          elif [ -n "${EXCLUDE_TABLES_INPUT}" ]; then
            EXCLUDE_TABLES="${EXCLUDE_TABLES_INPUT}"
          else
            EXCLUDE_TABLES=""
          fi
          echo "EXCLUDE_TABLES=${EXCLUDE_TABLES}" >> $GITHUB_ENV

      - name: Setup postgres client
        uses: DFE-Digital/github-actions/install-postgres-client@master
        with:
          version: 17

      - name: Install kubectl
        uses: DFE-Digital/github-actions/set-kubectl@master

      - uses: DFE-Digital/github-actions/set-kubelogin-environment@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up cluster environment variables
        shell: bash
        run: |
          case ${{ env.CLUSTER }} in
            test)
              echo "cluster_rg=s189t01-tsc-ts-rg" >> $GITHUB_ENV
              echo "cluster_name=s189t01-tsc-test-aks" >> $GITHUB_ENV
              ;;
            platform-test)
              echo "cluster_rg=s189t01-tsc-pt-rg" >> $GITHUB_ENV
              echo "cluster_name=s189t01-tsc-platform-test-aks" >> $GITHUB_ENV
              ;;
            production)
              echo "cluster_rg=s189p01-tsc-pd-rg" >> $GITHUB_ENV
              echo "cluster_name=s189p01-tsc-production-aks" >> $GITHUB_ENV
              ;;
            *)
              echo "unknown cluster"
              ;;
          esac

      - name: K8 setup
        shell: bash
        run: |
          az aks get-credentials --overwrite-existing -g ${{ env.cluster_rg }} -n ${{ env.cluster_name }}
          kubelogin convert-kubeconfig -l $AAD_LOGIN_METHOD
          curl -s https://raw.githubusercontent.com/DFE-Digital/teacher-services-cloud/main/scripts/konduit.sh -o ./konduit.sh
          chmod +x ./konduit.sh

      - name: Create compressed backup for aks env database
        shell: bash
        run: |
          BACKUP_FILE="${BACKUP_FILE}.gz"
          if [[ -n "${NAMESPACE}" ]]; then
            NAMESPACE_ARG="-n ${NAMESPACE}"
          fi
          EXCLUDE_OPTS=""
          if [[ -n "${EXCLUDE_TABLES}" ]]; then
            for table in ${EXCLUDE_TABLES}; do
              [[ -z "$table" ]] && continue
              table=$(echo "$table" | xargs)
              EXCLUDE_OPTS="$EXCLUDE_OPTS --exclude-table=$table"
            done
          fi

          export PGOPTIONS='-c tcp_keepalives_idle=60 -c tcp_keepalives_interval=30 -c tcp_keepalives_count=10'
          export PGSSLMODE=require

          ./konduit.sh ${NAMESPACE_ARG} -t 28800 -x sap-public-${{ env.DEPLOY_ENV }} -- pg_dump -E utf8 --clean --format=custom --compress=6 --if-exists --no-owner --verbose --no-password $EXCLUDE_OPTS -f "${BACKUP_FILE}"

          echo "BACKUP_FILE=${BACKUP_FILE}" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: ${{ env.BACKUP_FILE }}
          retention-days: 1

      - name: Backup Summary
        if: success()
        shell: bash
        run: |
          NOW=$(TZ=Europe/London date +"%F %R")
          echo 'BACKUP SUCCESSFUL!' >> $GITHUB_STEP_SUMMARY
          echo '  APP: ${{ inputs.app-name }}' >> $GITHUB_STEP_SUMMARY
          echo "  AT : ${NOW}" >> $GITHUB_STEP_SUMMARY
          echo "  FILENAME: ${{ env.BACKUP_FILE }}" >> $GITHUB_STEP_SUMMARY

      - name: Set outputs for restore job
        id: set-outputs
        run: |
          echo "backup_file=${BACKUP_FILE}" >> $GITHUB_OUTPUT

  enable-maintenance:
    name: Enable maintenance mode
    uses: ./.github/workflows/maintenance.yml
    needs: backup
    with:
      environment: ${{ inputs.target-environment }}
      mode: enable
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  restore:
    name: Restore database
    if: ${{ inputs.target-environment != 'production' || (inputs.target-environment == 'production' && inputs.confirm-production == 'true' )  }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target-environment }}
    concurrency: deploy_${{ inputs.target-environment }}
    needs: [enable-maintenance, backup]

    steps:
      - uses: actions/checkout@v4
        name: Checkout

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}

      - name: Set environment variables
        run: |
          source global_config/${{ inputs.target-environment }}.sh
          tf_vars_file=${{ env.TF_VARS_PATH }}/${{ inputs.target-environment }}.tfvars.json
          echo "CLUSTER=$(jq -r '.cluster' ${tf_vars_file})" >> $GITHUB_ENV
          echo "NAMESPACE=$(jq -r '.namespace' ${tf_vars_file})" >> $GITHUB_ENV
          echo "DB_SERVER=${AZURE_RESOURCE_PREFIX}-${SERVICE_SHORT}-${CONFIG_SHORT}-pg" >> $GITHUB_ENV
          echo "FILENAME=${{ needs.backup.outputs.backup-file }}" >> $GITHUB_ENV

      - name: Setup postgres client
        uses: DFE-Digital/github-actions/install-postgres-client@master
        with:
          version: 17

      - name: Install kubectl
        uses: DFE-Digital/github-actions/set-kubectl@master

      - uses: DFE-Digital/github-actions/set-kubelogin-environment@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up cluster environment variables
        shell: bash
        run: |
          case ${{ env.CLUSTER }} in
            test)
              echo "cluster_rg=s189t01-tsc-ts-rg" >> $GITHUB_ENV
              echo "cluster_name=s189t01-tsc-test-aks" >> $GITHUB_ENV
              ;;
            platform-test)
              echo "cluster_rg=s189t01-tsc-pt-rg" >> $GITHUB_ENV
              echo "cluster_name=s189t01-tsc-platform-test-aks" >> $GITHUB_ENV
              ;;
            production)
              echo "cluster_rg=s189p01-tsc-pd-rg" >> $GITHUB_ENV
              echo "cluster_name=s189p01-tsc-production-aks" >> $GITHUB_ENV
              ;;
            *)
              echo "unknown cluster"
              ;;
          esac

      - name: K8 setup
        shell: bash
        run: |
          az aks get-credentials --overwrite-existing -g ${{ env.cluster_rg }} -n ${{ env.cluster_name }}
          kubelogin convert-kubeconfig -l $AAD_LOGIN_METHOD
          curl -s https://raw.githubusercontent.com/DFE-Digital/teacher-services-cloud/main/scripts/konduit.sh -o ./konduit.sh
          chmod +x ./konduit.sh

      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: db-backup
          path: .

      - name: Restore backup to aks env database
        shell: bash
        run: |
          if [[ -n "${{ env.NAMESPACE }}" ]]; then
            NAMESPACE_ARG="-n ${{ env.NAMESPACE }}"
          fi

          COMPRESS=$( file --brief ${{ env.FILENAME }} | grep -ic compressed || true )
          if [[ $COMPRESS -gt 0 ]]; then
            COMPRESS_ARG=-c
          fi

          ./konduit.sh ${NAMESPACE_ARG} -i ${{ env.FILENAME }} ${COMPRESS_ARG} -t 28800 -x ${{ env.SERVICE_NAME }}-${{ inputs.target-environment }} -- pg_restore

      - name: Restore Summary
        if: success()
        shell: bash
        run: |
          NOW=$(TZ=Europe/London date +"%F %R")
          echo 'RESTORE SUCCESSFUL!' >> $GITHUB_STEP_SUMMARY
          echo '  APP: ${{ inputs.target-environment }}' >> $GITHUB_STEP_SUMMARY
          echo '  BACKUP FILE RESTORED: ${{ inputs.source-environment }} / ${{ needs.backup.outputs.backup-file }}' >> $GITHUB_STEP_SUMMARY
          echo "  AT : ${NOW}" >> $GITHUB_STEP_SUMMARY

  disable-maintenance:
    name: Disable maintenance mode
    uses: ./.github/workflows/maintenance.yml
    needs: restore
    with:
      environment: ${{ inputs.target-environment }}
      mode: disable
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}